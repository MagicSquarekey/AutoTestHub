# -*- coding: utf-8 -*-
# 项目设置 - 通用配置

# 环境配置
environment:
  name: "development"  # development, staging, production
  debug: true

# 超时设置
timeout:
  default: 30000       # 默认超时（毫秒）

# 日志配置
logging:
  level: "INFO"        # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/app.log"

# 输出配置
output:
  directory: "reports"
